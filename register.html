<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Registration - KALI LIFE ECOSYSTEM</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.register-box{
    background:#fff;
    padding:30px;
    border-radius:15px;
    width:330px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    text-align:center;
}

h2{
    color:#2e7d32;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1b5e20;
}

#error{
    color:red;
    margin-top:12px;
}

.back-btn{
    display:block;
    margin-top:18px;
    text-decoration:none;
    color:#2e7d32;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="register-box">

<h2>📝 User Registration</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="text" id="mobile" placeholder="Mobile Number">

<input type="password" id="password" placeholder="Password">

<button onclick="registerUser()">
Register
</button>

<p id="error"></p>

<a class="back-btn" href="index.html">
← Back to Home
</a>

</div>

<script>

function registerUser(){

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let password=document.getElementById("password").value;

if(name==="" || mobile==="" || password===""){
document.getElementById("error").innerHTML="সব তথ্য পূরণ করুন";
return;
}

alert("Registration Successful!");

window.location.href="login.html";

}

</script>

</body>
</html>
