<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - KALI LIFE ECOSYSTEM</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
width:90%;
max-width:400px;
}

h2{
text-align:center;
margin-bottom:20px;
color:#2e7d32;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

#error{
color:red;
text-align:center;
margin-top:10px;
}

a{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#2e7d32;
font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h2>Create Account</h2>
<input type="text" id="name" placeholder="Full Name">

<input type="text" id="mobile" placeholder="Mobile Number">

<input type="password" id="password" placeholder="Password">

<button onclick="registerUser()">Register</button>

<p id="error"></p>

<a href="login.html">Already have an account? Login</a>

</div>
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqXcxTrI22Ju1Rj9mtbUSC",
  authDomain: "kali-life-ecosystem.firebaseapp.com",
  projectId: "kali-life-ecosystem",
  storageBucket: "kali-life-ecosystem.firebasestorage.app",
  messagingSenderId: "734170546737",
  appId: "1:734170546737:web:26f79e",
  measurementId: "G-LBEY0W7RX3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.registerUser = async function () {
  const name = document.getElementById("name").value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!name || !mobile || !password) {
    document.getElementById("error").innerText = "সব তথ্য পূরণ করুন";
    return;
  }

  try {
    await addDoc(collection(db, "users"), {
      name,
      mobile,
      password,
      createdAt: new Date()
    });

    alert("Registration Successful!");
    window.location.href = "login.html";
  } catch (error) {
    console.error(error);
    alert(error.message);
    document.getElementById("error").innerText = "Registration Failed!";
  }
};
</script>

</body>
</html>
