<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Admin - KALI LIFE ECOSYSTEM</title>
</head>

<body>

<h1>KALI LIFE ECOSYSTEM</h1>
<h2>Create New Admin</h2>

<hr>

<form>

<h3>Personal Information</h3>

<label>Full Name</label><br>
<input type="text" placeholder="Enter Full Name"><br><br>

<label>Email Address</label><br>
<input type="email" placeholder="Enter Email"><br><br>

<label>Mobile Number</label><br>
<input type="tel" placeholder="Enter Mobile Number"><br><br>

<label>Password</label><br>
<input type="password" placeholder="Create Password"><br><br>

<hr>

<h3>Admin Role</h3>

<label>Select Admin Level</label><br>

<select>
<option>Super Admin</option>
<option>Core Admin</option>
<option>Department Admin</option>
</select>

<br><br>

<label>Select Role</label><br>

<select>
<option>Operations Admin</option>
<option>Agriculture Admin</option>
<option>Business & Marketplace Admin</option>
<option>Finance & Customer Admin</option>
<option>Technical & Security Admin</option>

<option>Crop Farming Admin</option>
<option>Horticulture Admin</option>
<option>Nursery Admin</option>
<option>Livestock Admin</option>
<option>Poultry Admin</option>
<option>Fisheries Admin</option>
<option>Organic Farming Admin</option>
<option>Farm Machinery Admin</option>
<option>Marketplace Admin</option>
<option>Warehouse Admin</option>
<option>Logistics Admin</option>
<option>Marketing Admin</option>
<option>Training Admin</option>
<option>Research & Development Admin</option>
<option>Veterinary Admin</option>
<option>Reports & Analytics Admin</option>
<option>Customer Service Admin</option>
<option>Accounts & Finance Admin</option>
</select>

<br><br>

<label>Reports To</label><br>

<select>
<option>Super Admin</option>
<option>Operations Admin</option>
<option>Agriculture Admin</option>
<option>Business & Marketplace Admin</option>
<option>Finance & Customer Admin</option>
<option>Technical & Security Admin</option>
</select>

<br><br>

<label>Status</label><br>

<select>
<option>Active</option>
<option>Inactive</option>
</select>

<br><br>

<button>Create Admin</button>
<button>Reset</button>

</form>

<hr>

<p>© KALI LIFE ECOSYSTEM - Admin Management System</p>

</body>
</html>
