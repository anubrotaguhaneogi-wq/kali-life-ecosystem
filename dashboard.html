<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KALI LIFE Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0d1117;
    color:#ffffff;
    text-align:center;
}
header{
    background:#00c853;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}
.container{
    padding:30px 20px;
}
.menu-btn{
    display:block;
    width:90%;
    max-width:350px;
    margin:15px auto;
    padding:18px;
    background:#00c853;
    color:#fff;
    text-decoration:none;
    border-radius:12px;
    font-size:20px;
    font-weight:bold;
}
.menu-btn:hover{
    background:#00a844;
}
</style>
</head>
<body>

<header>
KALI LIFE ECOSYSTEM
</header>

<div class="container">  
<a class="menu-btn" href="login.html">👤 User Login</a>

<a class="menu-btn" href="register.html">📝 User Registration</a>

<a class="menu-btn" href="https://youtube.com">▶️ Watch Videos</a>

<a class="menu-btn" href="admin.html">⚙️ Admin Login</a>

<a class="menu-btn" href="index.html">🏠 Home</a>
    <div style="background:#1b263b;padding:20px;border-radius:12px;margin-top:20px;">
    <h2>Welcome User</h2>

    <p>Name: <span id="userName">Loading...</span></p>

    <p>Mobile: <span id="userMobile">Loading...</span></p>
</div>
<button onclick="logoutUser()" class="menu-btn" style="background:#d32f2f;">
🚪 Logout
</button>
<script>

    if (!localStorage.getItem("userName")) {
    alert("Please login first!");
    window.location.href = "login.html";
}
   document.getElementById("userName").innerText =
localStorage.getItem("userName") || "Not Available"; 


document.getElementById("userMobile").innerText =
localStorage.getItem("userMobile") || "Not Found";
    function logoutUser() {
    localStorage.removeItem("userName");
    localStorage.removeItem("userMobile");
    alert("Logged out successfully!");
    window.location.href = "login.html";
    }
</script>

</div>

</body>
</html>
