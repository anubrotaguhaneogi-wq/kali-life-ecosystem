<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Management - KALI LIFE ECOSYSTEM</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    color:#0066cc;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#004c99;
}
</style>
</head>

<body>

<div class="container">

<h2>Sales Entry</h2>

<input type="date">

<input type="text" placeholder="Invoice Number">

<input type="text" placeholder="Customer Name">

<input type="text" placeholder="Customer Mobile">

<input type="text" placeholder="Product Name">

<input type="number" placeholder="Quantity">

<input type="number" placeholder="Selling Price (Per Piece)">

<input type="number" placeholder="Discount">

<select>
<option>Payment Method</option>
<option>Cash</option>
<option>UPI</option>
<option>Bank Transfer</option>
<option>Credit (Due)</option>
</select>

<textarea rows="4" placeholder="Remarks"></textarea>

<button>Save Sales</button>

</div>

</body>
</html>
