<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Login - KALI LIFE ECOSYSTEM</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#ffffff;
padding:30px;
border-radius:15px;
width:330px;
box-shadow:0 0 20px rgba(0,0,0,.3);
text-align:center;
}

h2{
color:#2e7d32;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}         
#error{
 color:red;margin-top:12px;
}

.back-btn{
display:block;
margin-top:18px;
text-decoration:none;
color:#2e7d32;
font-weight:bold;
}

</style>
</head>

<body>

<div class="login-box">

<h2>👤 User Login</h2>

<input type="text" id="mobile" placeholder="Mobile Number">

<input type="password" id="password" placeholder="Password">

<button onclick="loginUser()">
Login
</button>

<p id="error"></p>

<a class="back-btn" href="index.html">
⬅ Back to Home
</a>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqXcxTrI22Ju1Rj9mtbUSC...",
  authDomain: "kali-life-ecosystem.firebaseapp.com",
  projectId: "kali-life-ecosystem",
  storageBucket: "kali-life-ecosystem.firebasestorage.app",
  messagingSenderId: "734170546737",
  appId: "1:734170546737:web:26f79e...",
  measurementId: "G-LBEY0W7RX3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.loginUser = async function () {

  const mobile = document.getElementById("mobile").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!mobile || !password) {
    document.getElementById("error").innerHTML =
      "Please enter Mobile Number and Password";
    return;
  }

  const q = query(
    collection(db, "users"),
    where("mobile", "==", mobile)
  );

  const querySnapshot = await getDocs(q);

  if (querySnapshot.empty) {
    document.getElementById("error").innerHTML =
      "Mobile number not found!";
    return;
  }

  const user = querySnapshot.docs[0].data();

  if (user.password !== password) {
    document.getElementById("error").innerHTML =
      "Wrong password!";
    return;
  }

  alert("Login Successful!");

  window.location.href = "dashboard.html";

};

</script>
</body>
</html>
