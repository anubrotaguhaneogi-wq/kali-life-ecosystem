<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purchase Management - KALI LIFE ECOSYSTEM</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    color:green;
}

input,select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
}

button:hover{
    background:darkgreen;
}
</style>

</head>

<body>

<div class="container">

<h2>Purchase Entry</h2>

<input type="date">

<input type="text" placeholder="Supplier Name">

<input type="text" placeholder="Invoice Number">

<input type="text" placeholder="Product Name">

<input type="number" placeholder="Quantity">

<input type="number" placeholder="Purchase Rate">

<input type="number" placeholder="Transport Cost">

<input type="number" placeholder="Other Expenses">

<button>Save Purchase</button>

</div>

</body>
</html>
